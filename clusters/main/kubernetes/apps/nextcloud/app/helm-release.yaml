---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  interval: 15m
  chart:
    spec:
      chart: nextcloud
      version: 32.2.11
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:

    global:
      stopAll: false
      
    TZ: America/Chicago
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-nextcloud-app"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}" 
    nextcloud:
      # Initial Credentials
      credentials:
        initialAdminUser: ${NEXTCLOUD_USER}
        initialAdminPassword: ${NEXTCLOUD_PWD}
      # General settings
      general:
        # Custom Nextcloud Scripts
        run_optimize: true
        default_phone_region: BE
        # IP used for exposing nextcloud,
        # often the loadbalancer IP
        accessIP: ${TRAEFIK_IP}
        # Allows Nextcloud to connect to unsecure (http) endpoints
        force_enable_allow_local_remote_servers: false
      # File settings
      files:
        shared_folder_name: Shared
        max_chunk_size: 10485760
      # Expiration settings
      expirations:
        activity_expire_days: 90
        trash_retention_obligation: auto
        versions_retention_obligation: auto
      # Previews settings
      previews:
        enabled: true
        # It will also deploy the container
        imaginary: true
        cron: true
        schedule: "*/30 * * * *"
        max_x: 2048
        max_y: 2048
        max_memory: 5120
        max_file_size_image: 100
        # Setting for Imaginary
        max_allowed_resolution: 18.0
        jpeg_quality: 60
        square_sizes: 32 256
        width_sizes: 256 384
        height_sizes: 256
        # Casings are important
        # https://github.com/nextcloud/server/blob/master/config/config.sample.php#L1269
        # Only the last part of the provider is needed
        providers:
          - PNG
          - JPEG
      # Logging settings
      logging:
        log_level: 2
        log_file: /var/www/html/data/logs/nextcloud.log
        log_audit_file: /var/www/html/data/logs/audit.log
        log_date_format: d/m/Y H:i:s
      # ClamAV settings
      clamav:
        # It will also deploy the container
        # Note that this runs as root
        enabled: false
        stream_max_length: 26214400
        file_max_size: -1
        infected_action: only_log
      # Notify Push settings
      notify_push:
        # It will also deploy the container
        enabled: true
      # Collabora settings
      collabora:
        # It will also deploy the container
        enabled: true
        # default|compact|tabbed
        interface_mode: default
        username: ${COLLABORA_USER}
        password: ${COLLABORA_PWD}
        dictionaries:
          - de_DE
          - en_GB
          - en_US
          - el_GR
          - es_ES
          - fr_FR
          - pt_BR
          - pt_PT
          - it
          - nl
          - ru
      # PHP settings
      php:
        memory_limit: 5G
        upload_limit: 20G
        pm_max_children: 180
        pm_start_servers: 18
        pm_min_spare_servers: 12
        pm_max_spare_servers: 30
      opcache:
        interned_strings_buffer: 32
        max_accelerated_files: 10000
        memory_consumption: 128
        revalidate_freq: 60
        jit_buffer_size: 128     
    persistence:
      php-tune:
        enabled: true
        type: configmap
        objectName: php-tune
        targetSelector:
          main:
            main:
              mountPath: /usr/local/etc/php-fpm.d/zz-tune.conf
              subPath: zz-tune.conf
              readOnly: true
      redis-session:
        enabled: true
        type: configmap
        objectName: redis-session
        targetSelector:
          main:
            main:
              mountPath: /usr/local/etc/php/conf.d/redis-session.ini
              subPath: redis-session.ini
              readOnly: true
      opcache-recommended:
        enabled: true
        type: configmap
        objectName: opcache
        targetSelector:
          main:
            main:
              mountPath: /usr/local/etc/php/conf.d/opcache-recommended.ini
              subPath: opcache-recommended.ini
              readOnly: true
      nginx:
        enabled: true
        type: configmap
        objectName: nginx-config
        targetSelector:
          nginx:
            nginx:
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
      nginx-temp:
        enabled: true
        type: emptyDir
        targetSelector:
          nginx:
            nginx:
              mountPath: /tmp/nginx
      html:    
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
            src:
              enabled: true
      config:  
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              enabled: true                          
            src:
              enabled: true
      data:
        enabled: true
        type: nfs
        server: ${TRUENAS_IP}
        path: /mnt/data1/nc_userdata
        mountPath: /var/www/html/data             
      # data:     
      #   volsync:
      #     - name: b2
      #       type: restic
      #       credentials: s3
      #       dest:
      #         enabled: true                          
      #       src:
      #         enabled: true
    cnpg:
      main:
        password: ${NEXTCLOUD_CNPG_PWD}
        cluster:
          postgresql:
              max_slot_wal_keep_size: 10GB
              wal_compression: lz4
        #mode: recovery
        backups:
          enabled: true
          credentials: s3
          revision: "1"
          retentionPolicy: "30d"
          scheduledBackups:
            - name: daily-backup
              schedule: "0 * * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false
        recovery:
          method: object_store
          credentials: s3
          revision: "1"  
    redis:
      password: ${NEXTCLOUD_REDIS_PWD}
      enabled: true
      includeCommon: true
      username: default 
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
            # middlewares:
            #   - name: bouncer 
            #     namespace: traefik
            #   - name: local
            #     namespace: traefik
        hosts:
          - host: next.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix 
        tls:
          - hosts:
              - next.${DOMAIN_0}
            clusterIssuer: domain-0-wildcard