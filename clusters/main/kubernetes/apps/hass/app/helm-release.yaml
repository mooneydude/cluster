apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass
  namespace: hass
spec:
  interval: 15m
  chart:
    spec:
      chart: home-assistant
      version: 26.8.4
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    ## Enable host networking for direct network access. True breaks K8s secruirty.
    # hostNetwork: true
    TZ: America/Chicago   
    global:
      stopAll: false 
    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-hass"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}"       
    ingress:
      main:
        enabled: true
        hosts:
          - host: hass.${DOMAIN_1}
        integrations:
          traefik:
            enabled: true
            ## To do
            # middlewares:
            #   - name: local
            #     namespace: traefik
          certManager:
            enabled: true
            certificateIssuer: cloudflare  
    homeassistant:
      trusted_proxies:
      - 172.16.0.0/16
      - 172.17.0.0/16
    persistence:
      config:
        volsync:
          - name: b2
            schedule: "0 13 * * *"
            type: restic
            credentials: s3
            dest:               #VolSync Destination (Restore)
              enabled: true
            src:                #VolSync Source (Backup)
              enabled: true
    cnpg:
      main:
        # mode: recovery
        backups:
          enabled: true
          credentials: s3
          scheduledBackups:
            - name: daily-backup
              schedule: "0 0 13 * * *"
              backupOwnerReference: self
              immediate: true
              suspend: false          
          retentionPolicy: "7d"    
          # revision: "1"

        recovery:
          method: object_store
          credentials: s3
          # revision: "1"

