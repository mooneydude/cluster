apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass
  namespace: hass
spec:
  interval: 15m
  chart:
    spec:
      chart: home-assistant
      version: 26.8.3
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      stopAll: false  

    service:
      main:
        type: LoadBalancer
        loadBalancerIP: ${HASS_IP}

    credentials:
      s3:
        type: s3
        url: "${S3URL}"
        bucket: "${S3PREFIX}-hass"
        accessKey: "${S3ID}"
        secretKey: "${S3KEY}"
        encrKey: "${S3KEY}"
        
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          #   middlewares:
          #     - name: local
          #       namespace: traefik
          #     - name: bouncer
          #       namespace: traefik
            entrypoints:
              - websecure

        tls:
          - hosts:
              - hass.${DOMAIN_0}
            clusterIssuer: domain-0-wildcard

        hosts:
          - host: hass.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix   

    homeassistant:
      trusted_proxies:
      - 172.16.0.0/16
      - 172.17.0.0/16

    persistence:
      config:
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:               #VolSync Destination (Restore)
              enabled: true
            src:                #VolSync Source (Backup)
              enabled: true

    cnpg:
      main:
        mode: standalone   #Default is 'standalone'. Set to 'recovery' when recovery from S3, also change the revisions 
        # mode: recovery
        backups:
          enabled: true
          credentials: s3
          retentionPolicy: "14d"
          # revision: 1
        recovery:
          method: object_store
          credentials: s3
          # revision: "1"

