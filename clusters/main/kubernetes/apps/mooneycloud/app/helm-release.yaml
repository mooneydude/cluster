apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: mooneycloud
    namespace: mooneycloud
spec:
    interval: 5m
    chart:
        spec:
            # renovate: registryUrl=https://charts.truechartsoci.org
            chart: nextcloud
            version: 32.2.12
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system
            interval: 5m
    install:
        createNamespace: true
        crds: CreateReplace
        remediation:
            retries: 3
    upgrade:
        crds: CreateReplace
        remediation:
            retries: 3
    timeout: 20m
    values:
      TZ: America/Chicago
      global:
        stopAll: false
      credentials:
        s3:
          type: s3
          url: "${S3URL}"
          bucket: "${S3PREFIX}-mooneycloud"
          accessKey: "${S3ID}"
          secretKey: "${S3KEY}"
          encrKey: "${S3KEY}"
      service:
        main:
          type: LoadBalancer
          loadBalancerIP: ${NEXTCLOUD_IP}      
      # ingress:
      #   main:
      #     enabled: true
      #     integrations:
      #       traefik:
      #         enabled: true
      #         entrypoints:
      #         - web
      #         - websecure
      #       # certManager:
      #       #   enabled: true
      #       #   certificateIssuer: domain-0-wildcard
      #     hosts:
      #       - host: cloud.${DOMAIN_0}
      #         paths:
      #           - path: /
      #             pathType: Prefix          
      # cnpg:
      #   main:
      #     cluster:
      #       singleNode: false
      #     pgVersion: 15
      #     mode: recovery
      #     backups:
      #       enabled: true
      #       credentials: s3
      #       scheduledBackups:
      #         - name: daily-
      #           # '0 23 * * *' runs daily at 5pm CDT (standard). 4pm (daylight savings)
      #           schedule: "0 23 * * *"
      #           backupOwnerReference: self
      #           immediate: true
      #           suspend: false
      #     recovery:
      #       method: object_store
      #       credentials: s3
      cnpg:
        main:
          backups:
            enabled: true
            credentials: s3
          recovery:
            credentials: s3      
      persistence:
        config:
          volsync:
          - name: config
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
        # data:
        #   enabled: true
        #   type: nfs
        #   path: ${NEXTCLOUD_NFS_PATH}
        #   server: ${CONFIG_TRUENAS_IP}
        data:
          enabled: true
          type: nfs
          server: ${TRUENAS_IP}
          path: /mnt/data1/nc_userdata
          mountPath: /var/www/html/data               
        html:
          volsync:
          - name: html
            type: restic
            credentials: s3
            dest:
              enabled: true
            src:
              enabled: true
      nextcloud:
        collabora:
          enabled: false
          password: "${NEXTCLOUD_PWD}"
        credentials:
          initialAdminPassword: "${NEXTCLOUD_PWD}"
          initialAdminUser: "${NEXTCLOUD_USER}"
        general:
          accessIP: ${TRAEFIK_IP}
          default_phone_region: US
        previews:
          providers:
          - BMP
          - GIF
          - JPEG
          - Krita
          - MarkDown
          - MP3
          - OpenDocument
          - PNG
          - TXT
          - XBitmap
      onlyoffice:
        # It will not deploy the container
        # Only add the OnlyOffice settings
        enabled: true
        url: ${OFFICE_IP}
        internal_url: onlyoffice-onlyoffice-document-server.onlyoffice.svc.cluster.local:10043
        verify_ssl: false
        jwt: ${NEXTCLOUD_PWD}
        jwt_header: Authorization          