apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mc-gcli-1
  namespace: ext-service
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      version: 15.1.10
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    TZ: America/Chicago
    global:
      stopAll: false
    service:
      mc1:
        enabled: true
        type: ExternalIP
        externalIP: ${MC_IP}
        ports:
          mc1:
            enabled: true
            protocol: tcp  # Changed from http to tcp since 993 is typically for IMAP over SSL/TLS
            port: 993  # Changed to port 993
    ingress:
      mc1:
        enabled: true
        hosts:
          - host: ${DOMAIN_3}
        integrations:
          traefik:
            enabled: false
            # middlewares:
            #   - name: local
            #     namespace: traefik
          certManager:
            enabled: true
            certificateIssuer: cloudflare