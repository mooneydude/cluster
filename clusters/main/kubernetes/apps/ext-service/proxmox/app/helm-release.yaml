---
# yaml-language-server: schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: proxmox
  namespace: ext-service
spec:
  interval: 15m
  chart:
    spec:
      chart: external-service
      version: 15.10.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  values:
    global:
      stopAll: false

    TZ: America/Chicago
    service:
      main:
        type: ExternalIP
        externalIP: ${PROXMOX_IP}
        ports:
          main:
            protocol: http
            port: 8006
    ingress:
      main:
        enabled: true
        integrations:
          traefik:
            enabled: true
          #   middlewares:
          #     - name: local
          #       namespace: traefik
          #     - name: bouncer
          #       namespace: traefik
          #   entrypoints:
          #     - websecure
          # certManager:
          #   enabled: true
          #   certificateIssuer: cluster-cert

        tls:
          - hosts:
              - proxmox.${DOMAIN_0}
            clusterIssuer: domain-0-wildcard

        hosts:
          - host: proxmox.${DOMAIN_0}
            paths:
              - path: /
                pathType: Prefix                                    